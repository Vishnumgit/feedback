<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Form — Feedback System</title>
  <link rel="stylesheet" href="css/style.css?v=2" />
</head>
<body>
<div class="bg-orbs"></div>
<div class="page-wrapper" style="padding: 28px 24px; max-width: 820px; margin: 0 auto;">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
    <div>
      <a href="student-dashboard.html" style="color:var(--text-muted); font-size:13px; text-decoration:none;">← Back to Dashboard</a>
      <h1 class="page-title" style="margin-top:6px;" id="formTitle">Feedback Form</h1>
      <div class="page-subtitle" id="formSubtitle">Loading...</div>
    </div>
    <div id="anonBadge" style="display:none">
      <span class="badge badge-blue">&#x1F512; Anonymous Mode</span>
    </div>
  </div>

  <!-- Teacher Info Card -->
  <div class="glass" id="teacherInfo" style="padding:20px; margin-bottom:24px; display:flex; align-items:center; gap:16px;">
    <div class="teacher-avatar-lg" id="teacherAvatar" style="flex-shrink:0;">T</div>
    <div>
      <div style="font-size:16px; font-weight:700;" id="teacherName">—</div>
      <div style="font-size:13px; color:var(--text-muted);" id="teacherDept">—</div>
      <div class="teacher-subject-tag" id="teacherSubject" style="margin-top:8px; margin-bottom:0;">—</div>
    </div>
    <div style="margin-left:auto; text-align:right;">
      <div style="font-size:11px; color:var(--text-muted); margin-bottom:4px;">Progress</div>
      <div style="font-size:20px; font-weight:800; color:var(--accent-light);" id="progressText">0%</div>
      <div class="progress-bar" style="width:120px; margin-top:4px;"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <form id="feedbackForm" novalidate>
    <div id="sectionsContainer"></div>

    <!-- Comments -->
    <div class="section-card animate-in">
      <div class="section-card-header">
        <div class="section-card-title" style="display:flex; align-items:center; gap:10px;">
          <div class="section-num" style="background:var(--surface2); border:1px solid var(--border-light);">&#x1F4AC;</div>
          Additional Comments & Suggestions
        </div>
      </div>
      <div class="section-card-body">
        <div class="form-group" style="margin:0;">
          <label for="comments">Share your thoughts, suggestions, or any specific feedback (optional)</label>
          <textarea id="comments" rows="4" placeholder="Describe what you appreciated most, areas for improvement, specific teaching moments, etc."></textarea>
        </div>
      </div>
    </div>

    <div id="formError" style="display:none; padding:12px 16px; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); border-radius:8px; color:#f87171; font-size:13px; margin-top:16px;"></div>

    <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:24px; flex-wrap:wrap;">
      <a href="student-dashboard.html" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary" id="submitBtn">
        &#x1F680; Submit Feedback
      </button>
    </div>
  </form>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Success Modal -->
<div class="modal-overlay hidden" id="successModal">
  <div class="modal" style="text-align:center;">
    <div style="font-size:56px; margin-bottom:12px;">&#x1F389;</div>
    <div class="modal-title" style="justify-content:center;">Feedback Submitted!</div>
    <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">Your feedback has been recorded. Thank you for helping improve the quality of education!</p>
    <a href="student-dashboard.html" class="btn btn-primary" style="width:100%; justify-content:center;">Return to Dashboard</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
  fbInit();
  const session = requireAuth('student');

  const teacherId = sessionStorage.getItem('sfft_feedback_teacher');
  const feedbackSubjectId = sessionStorage.getItem('sfft_feedback_subject') || '';
  const isAnon = sessionStorage.getItem('sfft_feedback_anon') === '1';
  if (!teacherId) { window.location.href = 'student-dashboard.html'; }

  // Block re-submission: if student already submitted for this teacher+subject, redirect back
  if (hasSubmitted(session.userId, teacherId, feedbackSubjectId)) {
    alert('You have already submitted feedback for this teacher.');
    window.location.href = 'student-dashboard.html';
  }

  const teacher = getUserById(teacherId);
  const resolvedSubjectId = feedbackSubjectId || (teacher ? teacher.subjectId : null);
  const subject = resolvedSubjectId ? getSubjectById(resolvedSubjectId) : null;
  const questionnaire = resolvedSubjectId ? getQuestionnaire(resolvedSubjectId) : { sections: [] };

  // Populate teacher info
  if (teacher) {
    const initials = teacher.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    document.getElementById('teacherAvatar').textContent = initials;
    document.getElementById('teacherName').textContent = teacher.name;
    document.getElementById('teacherDept').textContent = teacher.department || 'Department N/A';
    document.getElementById('teacherSubject').innerHTML = subject ? '&#x1F4DA; ' + subject.name : '&#x1F4DA; General';
    document.getElementById('formTitle').textContent = `Feedback for ${teacher.name}`;
    document.getElementById('formSubtitle').textContent = subject ? `Subject-specific questionnaire: ${subject.name}` : 'General feedback form';
  }
  if (isAnon) document.getElementById('anonBadge').style.display = '';

  // Render sections
  const container = document.getElementById('sectionsContainer');

  // Default fallback questionnaire when subject has no questions configured
  const DEFAULT_QUESTIONNAIRE = {
    sections: [
      { title: 'Teaching Methodology', questions: [
        'Explains concepts clearly and at an appropriate pace',
        'Uses effective teaching methods and examples',
        'Encourages student participation and questions',
        'Links topics to real-world applications',
      ]},
      { title: 'Communication Skills', questions: [
        'Communicates learning objectives at the start of class',
        'Explains difficult topics in simple, understandable terms',
        'Is approachable and responds to student queries patiently',
      ]},
      { title: 'Subject Knowledge', questions: [
        'Demonstrates strong mastery of the subject matter',
        'Handles advanced or unexpected questions confidently',
        'Stays updated with the curriculum and modern developments',
      ]},
      { title: 'Classroom Management', questions: [
        'Maintains a focused and disciplined class environment',
        'Manages class time effectively',
        'Keeps all students engaged throughout the session',
      ]},
      { title: 'Overall Satisfaction', questions: [
        'Overall effectiveness as a teacher',
        'Impact on your understanding and interest in the subject',
      ]},
    ]
  };

  // Use questionnaire sections, falling back to default if empty
  let rawSections = questionnaire.sections || [];
  let hasQuestions = rawSections.some(s => s.questions && s.questions.length > 0);
  let sections = hasQuestions ? rawSections.filter(s => s.questions && s.questions.length > 0) : DEFAULT_QUESTIONNAIRE.sections;
  let totalQuestions = 0;

  // Attendance gate check
  const canSubmit = canSubmitFeedback(session.userId);
  const attRecord = getStudentAttendance(session.userId);

  if (!canSubmit && attRecord !== null) {
    container.innerHTML = `
      <div style="text-align:center; padding:60px 20px;">
        <div style="font-size:60px; margin-bottom:16px;">&#x1F6AB;</div>
        <div style="font-weight:800; font-size:24px; color:var(--danger); margin-bottom:10px;">Access Denied</div>
        <div style="font-size:16px; color:var(--text); max-width:400px; margin:0 auto; line-height:1.6;">
          Your current attendance is <strong style="color:var(--danger);">${attRecord.percentage}%</strong>.
          The institution requires a minimum of <strong>75%</strong> attendance to submit feedback.
        </div>
        <button class="btn btn-secondary" style="margin-top:30px;" onclick="window.location.href='student-dashboard.html'">← Return to Dashboard</button>
      </div>`;
    // Hide the comments + submit button area
    const lastDiv = document.querySelector('#feedbackForm > div:last-of-type');
    if (lastDiv) lastDiv.style.display = 'none';
  } else {
    sections.forEach((sec, si) => {
      totalQuestions += sec.questions.length;
      const div = document.createElement('div');
      div.className = 'section-card animate-in';
      div.style.marginBottom = '20px';
      div.innerHTML = `
        <div class="section-card-header">
          <div class="section-card-title" style="display:flex; align-items:center; gap:10px;">
            <div class="section-num">${si + 1}</div>
            ${sec.title}
          </div>
          <span style="font-size:12px; color:var(--text-muted);">${sec.questions.length} question${sec.questions.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="section-card-body">
          <div style="display:flex; gap:40px; font-size:10px; color:var(--text-muted); margin-bottom:12px; padding:0 2px;">
            <span>1 = Poor</span><span>2 = Fair</span><span>3 = Good</span><span>4 = Very Good</span><span>5 = Excellent</span>
          </div>
          ${sec.questions.map((q, qi) => {
            const likertScale = [1,2,3,4,5].map(v =>
              `<input type="radio" name="q_${si}_${qi}" id="q_${si}_${qi}_${v}" value="${v}" class="likert-option" onchange="updateProgress()" />
               <label for="q_${si}_${qi}_${v}" class="likert-label">${v}</label>`
            ).join('');
            return `
              <div class="likert-question" data-section="${si}" data-q="${qi}">
                <div class="question-text">${qi + 1}. ${q}</div>
                <div class="likert-scale">${likertScale}</div>
              </div>`;
          }).join('')}
        </div>
      `;
      container.appendChild(div);
    });
  }


  function updateProgress() {
    let answered = 0;
    sections.forEach((sec, si) => {
      sec.questions.forEach((_, qi) => {
        if (document.querySelector(`input[name="q_${si}_${qi}"]:checked`)) answered++;
      });
    });
    const pct = totalQuestions > 0 ? Math.round((answered / totalQuestions) * 100) : 0;
    document.getElementById('progressText').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
  }

  document.getElementById('feedbackForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const errDiv = document.getElementById('formError');
    errDiv.style.display = 'none';

    // Collect scores
    const scores = {};
    let missing = false;
    sections.forEach((sec, si) => {
      scores[sec.title] = [];
      sec.questions.forEach((_, qi) => {
        const checked = document.querySelector(`input[name="q_${si}_${qi}"]:checked`);
        if (!checked) missing = true;
        else scores[sec.title].push(parseInt(checked.value));
      });
    });

    if (missing) {
      errDiv.innerHTML = '&#x26A0;&#xFE0F; Please answer all questions before submitting.';
      errDiv.style.display = '';
      errDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return;
    }

    const comments = document.getElementById('comments').value.trim();
    saveResponse({
      teacherId,
      studentId: session.userId,
      subjectId: resolvedSubjectId || null,
      anonymous: isAnon,
      scores,
      comments
    });

    document.getElementById('successModal').classList.remove('hidden');
  });


  // Re-render form after Firebase sync (in case questionnaire wasn't in localStorage yet)
  window.addEventListener('firestore-synced', function() {
    console.log('[FeedbackForm] Firebase synced — re-checking questionnaire...');
    const freshQ = resolvedSubjectId ? getQuestionnaire(resolvedSubjectId) : { sections: [] };
    const freshRaw = freshQ.sections || [];
    const freshHasQ = freshRaw.some(s => s.questions && s.questions.length > 0);
    const freshSections = freshHasQ ? freshRaw.filter(s => s.questions && s.questions.length > 0) : DEFAULT_QUESTIONNAIRE.sections;

    // Only re-render if sections changed
    const oldTitles = sections.map(s => s.title).join(',');
    const newTitles = freshSections.map(s => s.title).join(',');
    if (oldTitles !== newTitles) {
      console.log('[FeedbackForm] Questionnaire updated from Firebase — re-rendering...');
      // Update the sections variable and re-render
      sections.length = 0;
      freshSections.forEach(s => sections.push(s));
      totalQuestions = 0;
      container.innerHTML = '';

      sections.forEach((sec, si) => {
        totalQuestions += sec.questions.length;
        const div = document.createElement('div');
        div.className = 'section-card animate-in';
        div.style.marginBottom = '20px';
        div.innerHTML = `
          <div class="section-card-header">
            <div class="section-card-title" style="display:flex; align-items:center; gap:10px;">
              <div class="section-num">${si + 1}</div>
              ${sec.title}
            </div>
            <span style="font-size:12px; color:var(--text-muted);">${sec.questions.length} question${sec.questions.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="section-card-body">
            <div style="display:flex; gap:40px; font-size:10px; color:var(--text-muted); margin-bottom:12px; padding:0 2px;">
              <span>1 = Poor</span><span>2 = Fair</span><span>3 = Good</span><span>4 = Very Good</span><span>5 = Excellent</span>
            </div>
            ${sec.questions.map((q, qi) => {
              const likertScale = [1,2,3,4,5].map(v =>
                '<input type="radio" name="q_' + si + '_' + qi + '" id="q_' + si + '_' + qi + '_' + v + '" value="' + v + '" class="likert-option" onchange="updateProgress()" />' +
                '<label for="q_' + si + '_' + qi + '_' + v + '" class="likert-label">' + v + '</label>'
              ).join('');
              return '<div class="likert-question" data-section="' + si + '" data-q="' + qi + '">' +
                '<div class="question-text">' + (qi + 1) + '. ' + q + '</div>' +
                '<div class="likert-scale">' + likertScale + '</div></div>';
            }).join('')}
          </div>
        `;
        container.appendChild(div);
      });
      updateProgress();
    }
  });
</script>
</body>
</html>
