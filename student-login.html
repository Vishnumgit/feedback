<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login — Feedback System</title>
  <link rel="stylesheet" href="css/style.css?v=2" />
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="bg-orbs"></div>
<div class="page-wrapper center-page">
  <div class="login-card glass animate-in">
    <div class="login-card-body">
      <div class="login-logo-ring">&#x1F393;</div>
      <h1 class="login-title">Student Login</h1>
      <p class="login-sub">Sign in with your college email to submit feedback</p>
      <div style="text-align:center; margin-bottom:20px;">
        <span class="role-badge badge-blue" style="background:rgba(59,130,246,0.15); color:#60a5fa; border:1px solid rgba(59,130,246,0.3);">&#x1F393; Student Portal</span>
      </div>

      <!-- Google Sign-In Button -->
      <div id="googleSignInWrap" style="display:flex; flex-direction:column; align-items:center; margin-bottom:20px;">
        <div id="g_id_onload"
          data-client_id="592918420084-qgj2566dvssfqboiv7bbassro1tui3eb.apps.googleusercontent.com"
          data-callback="handleGoogleSignIn"
          data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
          data-type="standard"
          data-shape="rectangular"
          data-theme="filled_black"
          data-text="signin_with"
          data-size="large"
          data-logo_alignment="left"
          data-width="320">
        </div>
        <div id="googleErr" style="margin-top:10px; font-size:12px; color:var(--danger); text-align:center; white-space:pre-line;"></div>
      </div>

      <!-- Divider -->
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
        <div style="flex:1; height:1px; background:var(--border);"></div>
        <span style="font-size:12px; color:var(--text-muted);">or sign in with password</span>
        <div style="flex:1; height:1px; background:var(--border);"></div>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">College Email</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="yourname@college.edu" autocomplete="email" required />
          </div>
          <div class="form-error" id="emailErr"></div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">&#x1F512;</span>
            <input type="password" id="password" placeholder="Enter your password" required />
          </div>
          <div class="form-error" id="passErr"></div>
        </div>
        <div style="text-align:right; margin-top:-8px; margin-bottom:12px;">
          <a href="reset-password.html" style="color:#a855f7; font-size:12.5px; text-decoration:none;">Forgot Password?</a>
        </div>
        <div class="form-error" id="loginErr" style="margin-bottom:12px; font-size:13px;"></div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          <span>Sign In</span>
        </button>
      </form>

      <div style="text-align:center; margin-top:20px;">
        <a href="index.html" style="color:var(--text-muted); font-size:12.5px; text-decoration:none;">← Back to Home</a>
      </div>
      <div style="margin-top:16px; padding:12px; background:rgba(59,130,246,0.07); border:1px solid rgba(59,130,246,0.2); border-radius:8px; font-size:12px; color:var(--text-muted);">
        <strong style="color:#60a5fa;">ℹ️ Note:</strong> Your account must be created by the administrator. The email you use with Google must match your registered college email.
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
  fbInit();
  const session = getSession();
  if (session && session.role === 'student') window.location.href = 'student-dashboard.html';

  // Google callback
  function handleGoogleSignIn(response) {
    const errEl = document.getElementById('googleErr');
    errEl.textContent = '';
    try {
      const s = googleLogin(response.credential, 'student');
      window.location.href = 'student-dashboard.html';
    } catch(err) {
      errEl.textContent = '&#x26A0;&#xFE0F; ' + err.message;
    }
  }
  window.handleGoogleSignIn = handleGoogleSignIn;

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const emailErr = document.getElementById('emailErr');
    const passErr = document.getElementById('passErr');
    const loginErr = document.getElementById('loginErr');
    emailErr.classList.remove('show'); passErr.classList.remove('show'); loginErr.classList.remove('show');

    let ok = true;
    if (!email) { emailErr.textContent = 'Email is required.'; emailErr.classList.add('show'); ok = false; }
    else if (!validateCollegeEmail(email)) {
      const d = getSettings().collegeDomain;
      emailErr.textContent = `Please use your college email (@${d}).`;
      emailErr.classList.add('show'); ok = false;
    }
    if (!password) { passErr.textContent = 'Password is required.'; passErr.classList.add('show'); ok = false; }
    if (!ok) return;

    try {
      const s = login(email, password);
      if (s.role !== 'student') { loginErr.textContent = 'This portal is for students only.'; loginErr.classList.add('show'); logout(); return; }
      window.location.href = 'student-dashboard.html';
    } catch(err) {
      loginErr.textContent = err.message; loginErr.classList.add('show');
    }
  });
</script>
</body>
</html>
