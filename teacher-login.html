<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Login — Feedback System</title>
  <link rel="stylesheet" href="css/style.css?v=2" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="bg-orbs"></div>
<div class="page-wrapper center-page">
  <div class="login-card glass animate-in">
    <div class="login-card-body">
      <div class="login-logo-ring">👨‍&#x1F3EB;</div>
      <h1 class="login-title">Teacher Login</h1>
      <p class="login-sub">Access your personalized feedback dashboard</p>
      <div style="text-align:center; margin-bottom:20px;">
        <span class="role-badge" style="background:rgba(16,185,129,0.15); color:#34d399; border:1px solid rgba(16,185,129,0.3);">👨‍&#x1F3EB; Teacher Portal</span>
      </div>

      <!-- Google Sign-In -->
      <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:20px;">
        <div id="g_id_onload"
          data-client_id="592918420084-qgj2566dvssfqboiv7bbassro1tui3eb.apps.googleusercontent.com"
          data-callback="handleGoogleSignIn"
          data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
          data-type="standard"
          data-shape="rectangular"
          data-theme="filled_black"
          data-text="signin_with"
          data-size="large"
          data-logo_alignment="left"
          data-width="320">
        </div>
        <div id="googleErr" style="margin-top:10px; font-size:12px; color:var(--danger); text-align:center; white-space:pre-line;"></div>
      </div>

      <!-- Divider -->
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
        <div style="flex:1; height:1px; background:var(--border);"></div>
        <span style="font-size:12px; color:var(--text-muted);">or sign in with password</span>
        <div style="flex:1; height:1px; background:var(--border);"></div>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">College Email</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="yourname@college.edu" />
          </div>
          <div class="form-error" id="emailErr"></div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">&#x1F512;</span>
            <input type="password" id="password" placeholder="Enter your password" />
          </div>
          <div class="form-error" id="passErr"></div>
        </div>
        <div class="form-error" id="loginErr" style="margin-bottom:12px; font-size:13px;"></div>
        <button type="submit" class="btn btn-full" style="background:linear-gradient(135deg,#059669,#10b981); color:#fff; box-shadow:0 4px 15px rgba(16,185,129,0.3);">Sign In</button>
      </form>

      <div style="text-align:center; margin-top:20px;">
        <a href="index.html" style="color:var(--text-muted); font-size:12.5px; text-decoration:none;">← Back to Home</a>
      </div>
      <div style="margin-top:16px; padding:12px; background:rgba(16,185,129,0.07); border:1px solid rgba(16,185,129,0.2); border-radius:8px; font-size:12px; color:var(--text-muted);">
        <strong style="color:#34d399;">ℹ️ Note:</strong> Teacher accounts are created by the administrator. Your Google account email must match your registered college email.
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
  fbInit();
  if (getSession()?.role === 'teacher') window.location.href = 'teacher-dashboard.html';

  function handleGoogleSignIn(response) {
    const errEl = document.getElementById('googleErr');
    errEl.textContent = '';
    try {
      googleLogin(response.credential, 'teacher');
      window.location.href = 'teacher-dashboard.html';
    } catch(err) {
      errEl.textContent = '&#x26A0;&#xFE0F; ' + err.message;
    }
  }
  window.handleGoogleSignIn = handleGoogleSignIn;

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const emailErr = document.getElementById('emailErr');
    const passErr = document.getElementById('passErr');
    const loginErr = document.getElementById('loginErr');
    [emailErr, passErr, loginErr].forEach(el => el.classList.remove('show'));

    let ok = true;
    if (!email) { emailErr.textContent = 'Email is required.'; emailErr.classList.add('show'); ok = false; }
    else if (!validateCollegeEmail(email)) { emailErr.textContent = `Use your college email (@${getSettings().collegeDomain}).`; emailErr.classList.add('show'); ok = false; }
    if (!password) { passErr.textContent = 'Password is required.'; passErr.classList.add('show'); ok = false; }
    if (!ok) return;

    try {
      const s = login(email, password);
      if (s.role !== 'teacher') { loginErr.textContent = 'This portal is for teachers only.'; loginErr.classList.add('show'); logout(); return; }
      window.location.href = 'teacher-dashboard.html';
    } catch(err) { loginErr.textContent = err.message; loginErr.classList.add('show'); }
  });
</script>
</body>
</html>
